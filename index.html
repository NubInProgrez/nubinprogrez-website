<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>nubinprogrez</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Fredoka', sans-serif !important; }

    :root {
      --bg: #07091a;
      --bg2: #0b0e24;
      --white: #f0f0f0;
      --dim: rgba(240,240,240,0.55);
      --accent: #7b8cff;
      --font: 'Fredoka', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
      overflow: hidden;
    }

    /* ── STAR CANVAS ── */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── RIPPLE CANVAS ── */
    #ripples {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── INTRO SCREEN ── */
    #intro {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    #intro.hide {
      opacity: 0;
      transform: translateY(-30px);
      pointer-events: none;
    }

    #select-label {
      font-size: 1.15rem;
      font-weight: 300;
      color: var(--dim);
      margin-bottom: 2rem;
      letter-spacing: 0.04em;
      font-family: var(--font);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    #intro.hiding #select-label {
      opacity: 0;
      transform: translateY(-20px);
    }

    .nav-buttons {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
      padding: 1.2rem 2.8rem;
      cursor: pointer;
      background: none;
      border: none;
      color: var(--white);
      font-family: var(--font);
      font-size: 1.875rem;
      font-weight: 600;
      transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), color 0.2s;
      position: relative;
    }

    .nav-btn:hover {
      transform: scale(1.18);
      color: #fff;
    }

    .nav-btn.clicked {
      animation: btnClick 0.28s cubic-bezier(.36,.07,.19,.97) forwards;
    }

    @keyframes btnClick {
      0%   { transform: scale(1); }
      30%  { transform: scale(0.80); }
      65%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* ── NAV ICONS (images) ── */
    .nav-btn .btn-icon {
      width: 3.9rem;
      height: 3.9rem;
      object-fit: contain;
      transition: transform 0.2s, filter 0.2s;
      filter: brightness(0.85);
    }

    .nav-btn:hover .btn-icon {
      filter: brightness(1.15) drop-shadow(0 0 6px rgba(123,140,255,0.6));
      transform: scale(1.08);
    }

    /* top nav: restore original smaller size */
    #topnav .nav-btn {
      font-size: 0.88rem;
    }

    #topnav .nav-btn .btn-icon {
      width: 1.6rem;
      height: 1.6rem;
    }

    .divider {
      width: 1px;
      height: 70px;
      background: rgba(255,255,255,0.25);
      flex-shrink: 0;
    }

    /* ── BRAND ── */
    #brand {
      position: fixed;
      bottom: 1.6rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.05rem;
      font-weight: 400;
      font-family: var(--font);
      letter-spacing: 0.12em;
      color: var(--dim);
      z-index: 20;
      transition: font-size 0.6s cubic-bezier(.22,1,.36,1),
                  bottom 0.6s cubic-bezier(.22,1,.36,1),
                  left 0.6s cubic-bezier(.22,1,.36,1),
                  transform 0.6s cubic-bezier(.22,1,.36,1),
                  color 0.4s;
    }

    #brand.small {
      font-size: 0.72rem;
      bottom: 0.55rem;
      left: 50%;
      transform: translateX(-50%);
      letter-spacing: 0.18em;
    }

    /* ── TOP NAV (post-intro) ── */
    #topnav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 15;
      display: flex;
      justify-content: center;
      background: rgba(7,9,26,0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 0.3rem 0 0.1rem;
      opacity: 0;
      transform: translateY(-100%);
      transition: opacity 0.55s ease 0.2s, transform 0.55s cubic-bezier(.22,1,.36,1) 0.2s;
      pointer-events: none;
      font-family: var(--font);
    }

    #topnav.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    #topnav .nav-btn {
      padding: 0.4rem 1.6rem 0.5rem;
      gap: 0.3rem;
    }

    #topnav .divider {
      height: 42px;
    }

    /* ── MAIN CONTENT ── */
    #content {
      position: relative;
      z-index: 5;
      padding-top: 80px;
      min-height: 100vh;
      overflow-y: auto;
      opacity: 0;
      transition: opacity 0.6s ease 0.5s;
      font-family: var(--font);
    }

    #content.visible { opacity: 1; }

    .section {
      display: none;
      padding: 4rem 2rem;
      max-width: 860px;
      margin: 0 auto;
      animation: fadeUp 0.5s ease forwards;
      font-family: var(--font);
    }

    .section.active { display: block; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section h2 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #fff;
      font-family: var(--font);
    }

    .section p {
      font-size: 1.05rem;
      font-weight: 300;
      color: var(--dim);
      line-height: 1.7;
      font-family: var(--font);
    }

    /* portfolio cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.2rem;
      margin-top: 2rem;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.4rem;
      transition: transform 0.2s, background 0.2s;
      font-family: var(--font);
    }

    .card:hover {
      transform: translateY(-4px);
      background: rgba(123,140,255,0.08);
    }

    .card h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; font-family: var(--font); }
    .card p  { font-size: 0.9rem; color: var(--dim); font-weight: 300; font-family: var(--font); }

    /* ── SOCIAL CARDS ── */
    .social-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.2rem;
      margin-top: 2rem;
    }

    .social-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 1.2rem 1.4rem;
      text-decoration: none;
      color: var(--white);
      font-family: var(--font);
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), background 0.2s, border-color 0.2s;
      cursor: pointer;
    }

    .social-card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: rgba(255,255,255,0.18);
    }

    .social-card:hover.discord  { background: rgba(88,101,242,0.15);  border-color: rgba(88,101,242,0.4); }
    .social-card:hover.roblox   { background: rgba(226,35,26,0.12);   border-color: rgba(226,35,26,0.35); }
    .social-card:hover.twitter  { background: rgba(29,161,242,0.12);  border-color: rgba(29,161,242,0.35); }

    .social-info { display: flex; flex-direction: column; gap: 0.25rem; }
    .social-info .platform { font-size: 0.78rem; font-weight: 300; color: var(--dim); letter-spacing: 0.06em; text-transform: uppercase; font-family: var(--font); }
    .social-info .username  { font-size: 1.05rem; font-weight: 600; font-family: var(--font); }

    .social-logo {
      width: 2.4rem;
      height: 2.4rem;
      flex-shrink: 0;
      opacity: 0.85;
      transition: opacity 0.2s, transform 0.2s;
    }

    .social-card:hover .social-logo { opacity: 1; transform: scale(1.1); }

    .section-sub {
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--dim);
      margin-top: 2.5rem;
      margin-bottom: 0.2rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: var(--font);
    }
    /* ── VILTRUMITE EASTER EGG ── */
    #vilt-overlay {
      position: fixed;
      inset: 0;
      z-index: 9990;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    #vilt-overlay.show {
      opacity: 1;
      pointer-events: all;
    }
    #vilt-overlay.fadeout {
      transition: opacity 3s ease;
      opacity: 0;
    }

    .vilt-text {
      position: fixed;
      z-index: 9995;
      font-family: 'Fredoka', sans-serif !important;
      font-weight: 700;
      font-size: clamp(3.5rem, 12vw, 9rem);
      line-height: 1;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.18s ease;
      text-align: center;
      max-width: 90vw;
    }
    .vilt-text.show { opacity: 1; }
    .vilt-text.hide { opacity: 0; }

    #vilt-emperor-img {
      position: fixed;
      z-index: 9996;
      width: min(480px, 80vw);
      left: 50%;
      bottom: -120vh;
      transform: translateX(-50%) rotate(-22deg);
      pointer-events: none;
      opacity: 1;
      transition: none;
    }
    #vilt-emperor-img.rise {
      transition: bottom 1.4s cubic-bezier(.22,1,.36,1),
                  transform 1.4s cubic-bezier(.22,1,.36,1);
      bottom: 8vh;
      transform: translateX(-50%) rotate(0deg);
    }
    #vilt-emperor-img.fadeout {
      transition: opacity 3s ease;
      opacity: 0;
    }
  </style>
</head>

<script>
  /* ── EXPANDING DARK CIRCLES (ripples) ── */
  const rCanvas = document.getElementById('ripples');
  const rCtx = rCanvas.getContext('2d');
  let ripples = [];

  function resizeRipples() {
    rCanvas.width  = window.innerWidth;
    rCanvas.height = window.innerHeight;
  }

  function spawnRipple() {
    ripples.push({
      x: Math.random() * rCanvas.width,
      y: Math.random() * rCanvas.height,
      r: 0,
      maxR: 180 + Math.random() * 220,
      speed: 0.35 + Math.random() * 0.45,
      alpha: 0.18 + Math.random() * 0.14
    });
  }

  // seed some ripples spread over time so they don't all start at once
  for (let i = 0; i < 7; i++) {
    setTimeout(spawnRipple, i * 900);
  }
  setInterval(spawnRipple, 1400);

  function drawRipples() {
    rCtx.clearRect(0, 0, rCanvas.width, rCanvas.height);
    ripples = ripples.filter(rp => rp.r < rp.maxR);

    ripples.forEach(rp => {
      rp.r += rp.speed;
      const progress = rp.r / rp.maxR;          // 0 → 1
      const alpha = rp.alpha * (1 - progress);   // fade as it expands

      // dark ring: subtle border only
      rCtx.beginPath();
      rCtx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
      rCtx.strokeStyle = `rgba(0, 5, 30, ${alpha * 1.6})`;
      rCtx.lineWidth = 28 * (1 - progress * 0.5);
      rCtx.stroke();

      // inner dark fill that shrinks in opacity
      const grad = rCtx.createRadialGradient(rp.x, rp.y, 0, rp.x, rp.y, rp.r);
      grad.addColorStop(0,   `rgba(0, 4, 20, ${alpha * 0.55})`);
      grad.addColorStop(0.6, `rgba(0, 4, 20, ${alpha * 0.2})`);
      grad.addColorStop(1,   `rgba(0, 4, 20, 0)`);
      rCtx.beginPath();
      rCtx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
      rCtx.fillStyle = grad;
      rCtx.fill();
    });

    requestAnimationFrame(drawRipples);
  }

  resizeRipples();
  requestAnimationFrame(drawRipples);

  /* ── STARS ── */
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.3,
        a: Math.random(),
        speed: Math.random() * 0.004 + 0.001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const alpha = 0.3 + 0.7 * Math.abs(Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,190,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  window.addEventListener('resize', () => {
    resize(); initStars();
    resizeRipples();
  });

  resize(); initStars(); requestAnimationFrame(drawStars);

  /* ── CLICK SFX ── */
  const clickSfx = new Audio('https://raw.githubusercontent.com/NubInProgrez/nubinprogrez-website/main/clicksfx.mp3');
  clickSfx.preload = 'auto';

  function playClick(btn) {
    clickSfx.currentTime = 0;
    clickSfx.play().catch(() => {});
    btn.classList.remove('clicked');
    void btn.offsetWidth;
    btn.classList.add('clicked');
    btn.addEventListener('animationend', () => btn.classList.remove('clicked'), { once: true });
  }

  /* ── TRANSITION ── */
  let transitioned = false;

  function selectSection(id, btn) {
    if (btn) playClick(btn);
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    const target = document.getElementById(id);
    if (target) target.classList.add('active');

    if (!transitioned) {
      transitioned = true;
      const intro   = document.getElementById('intro');
      const topnav  = document.getElementById('topnav');
      const content = document.getElementById('content');
      const brand   = document.getElementById('brand');

      intro.classList.add('hiding');

      setTimeout(() => {
        intro.classList.add('hide');
        topnav.classList.add('visible');
        brand.classList.add('small');
        content.classList.add('visible');
        document.body.style.overflow = 'auto';
      }, 350);
    }
  }
  /* ── VILTRUMITE EASTER EGG ── */
  const COMBO = ['6', '7'];
  let comboIdx = 0;
  let eggDone = false;

  const viltSfx = new Audio('https://raw.githubusercontent.com/NubInProgrez/nubinprogrez-website/main/tungtungsahur.mp3');
  viltSfx.preload = 'auto';

  document.addEventListener('keydown', (e) => {
    if (eggDone) return;
    if (e.key === COMBO[comboIdx]) {
      comboIdx++;
      if (comboIdx === COMBO.length) {
        comboIdx = 0;
        triggerViltrumite();
      }
    } else {
      comboIdx = e.key === COMBO[0] ? 1 : 0;
    }
  });

  function randRot() { return (Math.random() * 34 - 17).toFixed(1); }
  function randPos() {
    return {
      left: (15 + Math.random() * 55) + 'vw',
      top:  (10 + Math.random() * 55) + 'vh'
    };
  }

  function makeText(content, color) {
    const el = document.createElement('div');
    el.className = 'vilt-text';
    el.textContent = content;
    el.style.color = color;
    const pos = randPos();
    el.style.left = pos.left;
    el.style.top  = pos.top;
    el.style.transform = `translate(-50%, -50%) rotate(${randRot()}deg)`;
    document.body.appendChild(el);
    return el;
  }

  function showEl(el)  { requestAnimationFrame(() => { requestAnimationFrame(() => { el.classList.add('show'); el.classList.remove('hide'); }); }); }
  function hideEl(el)  { el.classList.add('hide'); el.classList.remove('show'); setTimeout(() => el.remove(), 250); }

  function centerText(content, color) {
    const el = document.createElement('div');
    el.className = 'vilt-text';
    el.textContent = content;
    el.style.color = color;
    el.style.left = '50vw';
    el.style.top  = '50vh';
    el.style.transform = 'translate(-50%, -50%)';
    document.body.appendChild(el);
    return el;
  }

  function triggerViltrumite() {
    eggDone = true;

    const overlay = document.getElementById('vilt-overlay');
    const emperorImg = document.getElementById('vilt-emperor-img');

    // 1. Black overlay fades in
    overlay.classList.add('show');

    // play audio
    viltSfx.currentTime = 0;
    viltSfx.play().catch(() => {});

    let activeEls = [];

    // t=0 — "IM NOT" white, random position & rotation
    const t1 = makeText("IM NOT", '#ffffff');
    showEl(t1);
    activeEls.push(t1);

    // t=0.45s — "A VILTRUMITE!" red, random position & rotation
    setTimeout(() => {
      const t2 = makeText("A VILTRUMITE!", '#ff1a1a');
      showEl(t2);
      activeEls.push(t2);
    }, 450);

    // watch currentTime for t=2.0
    viltSfx.addEventListener('timeupdate', function onTime() {
      const ct = viltSfx.currentTime;

      // t=2.0 — clear texts, show center message
      if (ct >= 2.0 && !viltSfx._phase2) {
        viltSfx._phase2 = true;
        activeEls.forEach(el => hideEl(el));
        activeEls = [];

        const t3 = centerText("YOU SHOULDN'T HAVE LEFT ME IN CHARGE", '#ffffff');
        t3.style.fontSize = 'clamp(1.8rem, 5vw, 4rem)';
        showEl(t3);
        activeEls.push(t3);
      }

      // t=3.2 — clear center text
      if (ct >= 3.2 && !viltSfx._phase3) {
        viltSfx._phase3 = true;
        activeEls.forEach(el => hideEl(el));
        activeEls = [];
      }

      // t=4.1 — "YOU ARE" random pos, then "THE EMPEROR" center red
      if (ct >= 4.1 && !viltSfx._phase4) {
        viltSfx._phase4 = true;
        activeEls.forEach(el => hideEl(el));
        activeEls = [];

        const t4 = makeText("YOU ARE", '#ffffff');
        showEl(t4);
        activeEls.push(t4);

        setTimeout(() => {
          const t5 = centerText("THE EMPEROR", '#ff1a1a');
          showEl(t5);
          activeEls.push(t5);
        }, 300);
      }

      // t=5.1 — destroy last texts, rise emperor image
      if (ct >= 5.1 && !viltSfx._phase5) {
        viltSfx._phase5 = true;
        activeEls.forEach(el => hideEl(el));
        activeEls = [];

        // reset image to off-screen
        emperorImg.classList.remove('rise', 'fadeout');
        emperorImg.style.opacity = '1';
        emperorImg.style.bottom = '-120vh';
        emperorImg.style.transform = 'translateX(-50%) rotate(-22deg)';

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            emperorImg.classList.add('rise');
          });
        });
      }
    });

    // when audio ends — fade emperor image AND overlay together over 3s
    viltSfx.addEventListener('ended', () => {
      emperorImg.classList.remove('rise');
      emperorImg.classList.add('fadeout');
      overlay.classList.remove('show');
      overlay.classList.add('fadeout');

      setTimeout(() => {
        emperorImg.style.opacity = '0';
        overlay.remove();
      }, 3100);
    }, { once: true });
  }
</script>

     src="https://raw.githubusercontent.com/NubInProgrez/nubinprogrez-website/main/tungtungemperor.png"
     alt="" />
